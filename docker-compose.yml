services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - sqlite_data:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - DATABASE_URL=sqlite:///./content_factory.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend

volumes:
  sqlite_data:
